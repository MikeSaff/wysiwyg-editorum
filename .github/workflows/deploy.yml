name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build mtef-to-mathml (prototype links it via file:..)
        working-directory: mtef-to-mathml
        run: |
          npm install
          npm run build
      - name: Install and build prototype
        working-directory: prototype
        run: |
          npm install
          npx vite build --base /wysiwyg-editorum/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
