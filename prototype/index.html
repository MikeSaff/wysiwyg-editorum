<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYSIWYG Editorum — Прототип</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>WYSIWYG Editorum <span class="version">prototype v0.1</span></h1>
      <p class="hint">Вставьте текст из Word (Ctrl+V) или начните печатать. Формула: оберните LaTeX в $...$ (inline) или $$...$$ (block).</p>
    </header>
    <div id="toolbar"></div>
    <div id="import-bar" style="background:#e8f5e9;padding:6px 12px;font-size:13px;border:1px solid #ddd;border-bottom:none;display:flex;align-items:center;gap:12px;font-family:'PT Sans',sans-serif;">
      <span>📄 <strong>Импорт из Word:</strong></span>
      <label id="btn-import-docx" style="cursor:pointer;background:#4caf50;color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;">
        Выбрать .docx файл
        <input type="file" accept=".docx" id="file-input" style="display:none;">
      </label>
      <span style="color:#666;">или перетащите .docx файл прямо в редактор</span>
      <span id="import-status" style="color:#1976d2;margin-left:auto;"></span>
    </div>
    <div id="content-area">
      <div id="nav-panel">
        <div class="nav-title">Содержание</div>
        <div id="nav-items"></div>
      </div>
      <div id="editor"></div>
    </div>
    <div id="output-panel" style="display:none;">
      <div class="output-tabs">
        <button class="tab active" data-tab="json">DocumentJSON</button>
        <button class="tab" data-tab="html">HTML</button>
      </div>
      <pre id="json-output"></pre>
      <pre id="html-output" style="display:none"></pre>
    </div>
    <div id="dev-toggle" style="grid-column:1/-1;text-align:right;padding:8px;">
      <button id="btn-dev-toggle" style="font-size:11px;padding:2px 10px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;cursor:pointer;color:#999;">⚙ Dev: JSON/HTML</button>
    </div>
    <script>
      document.getElementById('btn-dev-toggle').addEventListener('click', function() {
        var panel = document.getElementById('output-panel');
        if (panel.style.display === 'none' || !panel.style.display) {
          panel.style.display = 'block';
          this.textContent = '⚙ Скрыть JSON/HTML';
        } else {
          panel.style.display = 'none';
          this.textContent = '⚙ Dev: JSON/HTML';
        }
      });
    </script>
  </div>
  <div id="lightbox-overlay">
    <img id="lightbox-img" src="" alt="">
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
